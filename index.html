      margin-left: var(--space-lg);
      margin-bottom: var(--space-md);
    }
    
    .task-panel-content li {
      margin-bottom: var(--space-xs);
    }
    
    .task-panel-content strong {
      color: var(--color-text);
    }
    
    .task-panel-content em {
      color: var(--color-text-muted);
    }
    
    
    /* Task Panel Sections */
    .task-section {
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-xl);
      border-bottom: 1px solid var(--color-border);
    }
    
    .task-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .task-section-title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--color-primary);
      margin-bottom: var(--space-md);
      font-weight: 600;
    }
    
    .task-section-title span {
      font-size: 1.3rem;
    }
    
    /* =====================================================
       SOURCE MATERIAL CARD - Prominent display at top of writing area
       ===================================================== */
    
    .source-material-card {
      background: var(--color-surface);
      border: 1px solid rgba(79, 70, 229, 0.25);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    
    .source-material-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      background: rgba(79, 70, 229, 0.06);
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition-fast);
    }
    
    .source-material-header:hover {
      background: rgba(79, 70, 229, 0.1);
    }
    
    .source-material-title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--color-primary);
      margin: 0;
      font-weight: 600;
    }
    
    .source-material-title-icon {
      font-size: 1.2rem;
    }
    
    .source-material-toggle {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      color: var(--color-text-muted);
      font-size: 0.85rem;
      transition: color var(--transition-fast);
    }
    
    .source-material-header:hover .source-material-toggle {
      color: var(--color-primary);
    }
    
    .source-material-toggle-icon {
      font-size: 1rem;
      transition: transform var(--transition-fast);
    }
    
    .source-material-card.collapsed .source-material-toggle-icon {
      transform: rotate(-90deg);
    }
    
    .source-material-content {
      padding: var(--space-lg);
      max-height: 400px;
      overflow-y: auto;
      transition: max-height var(--transition-base), padding var(--transition-base), opacity var(--transition-base);
    }
    
    .source-material-card.collapsed .source-material-content {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
      overflow: hidden;
    }
    
    .source-material-text {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.8;
      color: var(--color-text);
      white-space: pre-wrap;
    }
    
    .source-material-text p {
      margin-bottom: var(--space-md);
      text-indent: 2em;
    }
    
    .source-material-text p:first-child {
      text-indent: 0;
    }
    
    .source-material-text p:last-child {
      margin-bottom: 0;
    }
    
    /* Scrollbar styling for source material */
    .source-material-content::-webkit-scrollbar {
      width: 8px;
    }
    
    .source-material-content::-webkit-scrollbar-track {
      background: var(--color-bg-alt);
      border-radius: 4px;
    }
    
    .source-material-content::-webkit-scrollbar-thumb {
      background: var(--color-border-strong);
      border-radius: 4px;
    }
    
    .source-material-content::-webkit-scrollbar-thumb:hover {
      background: var(--color-primary);
    }
    
    /* Source material hint when collapsed */
    .source-material-hint {
      padding: var(--space-sm) var(--space-lg);
      font-size: 0.85rem;
      color: var(--color-text-muted);
      font-style: italic;
      display: none;
    }
    
    .source-material-card.collapsed .source-material-hint {
      display: block;
    }
    
    /* =====================================================
       TECHNICAL ERROR CORRECTION - Two-stage submission
       ===================================================== */
    
    .technical-check-panel {
      background: #ffffff;
      border: 1px solid var(--color-warning-light);
      border-left: 3px solid var(--color-warning);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
      box-shadow: var(--shadow-md);
    }
    
    .technical-check-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--color-border);
    }
    
    .technical-check-title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--color-warning);
      margin: 0;
    }
    
    .technical-check-progress {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }
    
    .error-progress-dots {
      display: flex;
      gap: 4px;
    }
    
    .error-progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color-surface-hover);
      transition: all var(--transition-fast);
    }
    
    .error-progress-dot.completed {
      background: var(--color-success);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    
    .error-progress-dot.current {
      background: var(--color-warning);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      transform: scale(1.2);
    }
    
    .error-progress-dot.skipped {
      background: var(--color-text-muted);
      opacity: 0.5;
    }
    
    .error-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }
    
    .error-type-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: var(--space-md);
    }
    
    .error-type-badge.spelling {
      background: var(--color-error-bg);
      color: var(--color-error);
    }
    
    .error-type-badge.grammar {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    
    .error-type-badge.punctuation {
      background: rgba(124, 58, 237, 0.1);
      color: #7c3aed;
    }
    
    .error-type-badge.expression {
      background: rgba(37, 99, 235, 0.1);
      color: var(--color-info);
    }
    
    .error-context {
      background: var(--color-bg-secondary);
      border-left: 3px solid var(--color-warning);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    
    .error-highlight {
      background: rgba(220, 38, 38, 0.12);
      border-bottom: 2px wavy var(--color-error);
      padding: 0 2px;
      border-radius: 2px;
    }
    
    .error-rule {
      margin-bottom: var(--space-md);
    }
    
    .error-rule-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: var(--space-xs);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .error-rule-text {
      font-size: 0.95rem;
      color: var(--color-text);
      line-height: 1.5;
    }
    
    .error-hint {
      background: rgba(79, 70, 229, 0.05);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    
    .error-hint-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: var(--space-xs);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .error-hint-text {
      font-size: 0.95rem;
      color: var(--color-text-secondary);
      font-style: italic;
    }
    
    .error-correction-area {
      margin-bottom: var(--space-md);
    }
    
    .error-correction-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-sm);
    }
    
    .error-correction-input {
      width: 100%;
      padding: var(--space-md);
      font-family: var(--font-body);
      font-size: 1rem;
      background: var(--color-surface);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      transition: all var(--transition-fast);
    }
    
    .error-correction-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }
    
    .error-correction-input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }
    
    .error-correction-input.success {
      border-color: var(--color-success);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }
    
    .correction-feedback {
      margin-top: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }
    
    .correction-feedback.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
    }
    
    .correction-feedback.success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--color-success);
    }
    
    .correction-feedback.skipped {
      background: rgba(100, 100, 120, 0.2);
      color: var(--color-text-muted);
    }
    
    .technical-check-actions {
      display: flex;
      gap: var(--space-md);
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    
    .technical-all-clear {
      text-align: center;
      padding: var(--space-xl);
    }
    
    .technical-all-clear-icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
    }
    
    .technical-all-clear-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--color-success);
      margin-bottom: var(--space-sm);
    }
    
    .technical-all-clear-text {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-lg);
    }
    
    /* Completion celebration */
    .errors-complete-celebration {
      text-align: center;
      padding: var(--space-xl);
      background: var(--color-success-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-success-light);
    }
    
    .celebration-icon {
      font-size: 3rem;
      margin-bottom: var(--space-md);
      animation: bounce 0.5s ease infinite alternate;
    }
    
    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
    
    .celebration-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--color-success);
      margin-bottom: var(--space-sm);
    }
    
    .celebration-text {
      color: var(--color-text-secondary);
      margin-bottom: var(--space-lg);
    }
    
    /* =====================================================
       ESSAY COMPARISON - Original vs Improved
       ===================================================== */
    
    .essay-comparison {
      background: #ffffff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      margin-bottom: var(--space-xl);
      box-shadow: var(--shadow-lg);
    }
    
    .comparison-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    
    .comparison-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--color-primary);
      margin-bottom: var(--space-sm);
    }
    
    .comparison-subtitle {
      color: var(--color-text-muted);
      font-size: 0.95rem;
    }
    
    .grade-comparison-boxes {
      display: flex;
      gap: var(--space-xl);
      justify-content: center;
      align-items: center;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }
    
    .grade-box {
      text-align: center;
      padding: var(--space-lg) var(--space-xl);
      border-radius: var(--radius-lg);
      min-width: 160px;
    }
    
    .grade-box.original {
      background: var(--color-bg-secondary);
      border: 2px solid var(--color-border-strong);
    }
    
    .grade-box.improved {
      background: var(--color-success-bg);
      border: 2px solid var(--color-success);
      box-shadow: var(--shadow-sm);
    }
    
    .grade-box-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }
    
    .grade-box-grade {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: var(--space-xs);
    }
    
    .grade-box.original .grade-box-grade {
      color: var(--color-text-secondary);
    }
    
    .grade-box.improved .grade-box-grade {
      color: var(--color-success);
    }
    
    .grade-box-marks {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }
    
    .comparison-arrow {
      font-size: 2rem;
      color: var(--color-primary);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    
    .improvement-summary {
      text-align: center;
      padding: var(--space-lg);
      background: rgba(79, 70, 229, 0.06);
      border: 1px solid rgba(79, 70, 229, 0.2);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-xl);
    }
    
    .improvement-headline {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--color-primary);
      margin-bottom: var(--space-sm);
    }
    
    .marks-gained {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--color-success-bg);
      color: var(--color-success);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 1rem;
    }
    
    .improvement-details {
      margin-top: var(--space-xl);
    }
    
    .improvement-details-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--color-primary);
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .improvement-item {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      border-left: 3px solid var(--color-success);
    }
    
    .improvement-item-area {
      font-weight: 600;
      color: var(--color-success);
      margin-bottom: var(--space-xs);
    }
    
    .improvement-item-before {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      margin-bottom: var(--space-xs);
    }
    
    .improvement-item-before::before {
      content: "Before: ";
      color: var(--color-error);
      font-weight: 500;
    }
    
    .improvement-item-after {
      font-size: 0.9rem;
      color: var(--color-text);
    }
    
    .improvement-item-after::before {
      content: "After: ";
      color: var(--color-success);
      font-weight: 500;
    }
    
    .comparison-progress-comment {
      padding: var(--space-lg);
      background: var(--color-success-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-success-light);
      margin-top: var(--space-lg);
    }
    
    .comparison-progress-label {
      font-size: 0.85rem;
      color: var(--color-success);
      font-weight: 600;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .comparison-progress-text {
      font-size: 1rem;
      color: var(--color-text);
      line-height: 1.6;
    }
    
        /* Mobile task toggle button */
    .task-toggle-btn {
      display: none;
      position: fixed;
      bottom: var(--space-lg);
      right: var(--space-lg);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: var(--shadow-lg);
      z-index: 100;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    
    .task-toggle-btn:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-xl);
    }
    
    .task-toggle-btn.has-task {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Mobile styles */
    @media (max-width: 1024px) {
      .writing-layout {
        flex-direction: column;
      }
      
      .task-panel {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-height: 100vh;
        border-radius: 0;
        z-index: 200;
        padding: var(--space-xl);
        padding-top: var(--space-lg);
      }
      
      .task-panel.mobile-open {
        display: block;
      }
      
      .task-panel-close {
        display: block;
      }
      
      .task-toggle-btn.has-task {
        display: flex;
      }
    }
    
    @media (min-width: 1025px) {
      .task-toggle-btn {
        display: none !important;
      }
    }
    
    /* =====================================================
       ESSAY SELECTION SCREEN
       ===================================================== */
    
    .essay-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-lg);
      margin-top: var(--space-xl);
    }
    
    .essay-card {
      background: #ffffff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .essay-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      opacity: 0;
      transition: opacity var(--transition-base);
    }

    .essay-card:hover {
      border-color: rgba(79, 70, 229, 0.4);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .essay-card:hover::before {
      opacity: 1;
    }

    .essay-card-icon {
      margin-bottom: var(--space-md);
      opacity: 0.9;
    }
    
    .essay-card-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--color-primary);
      margin-bottom: var(--space-sm);
    }
    
    .essay-card-meta {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    
    .essay-card-meta span {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .essay-card-description {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .essay-card-stats {
      display: flex;
      gap: var(--space-lg);
      margin-top: var(--space-lg);
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border);
      font-size: 0.85rem;
    }
    
    .essay-card-stat {
      color: var(--color-text-muted);
    }
    
    .essay-card-stat strong {
      color: var(--color-primary);
    }
    
    /* Teacher dashboard essay filter */
    .essay-filter {
      display: flex;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    
    .essay-filter-btn {
      padding: var(--space-sm) var(--space-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-base);
      font-size: 0.85rem;
    }
    
    .essay-filter-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    
    .essay-filter-btn.active {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      border-color: var(--color-primary);
      color: var(--color-text-inverse);
    }
  

    /* =====================================================
       TARGET GRADE SELECTOR
       ===================================================== */

    .grade-selector {
      margin-bottom: var(--space-lg);
    }

    .grade-selector-label {
      display: block;
      margin-bottom: var(--space-sm);
      font-weight: 600;
    }

    .grade-selector-hint {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: var(--space-md);
      font-style: italic;
    }

    .grade-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .grade-button {
      min-width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .grade-button:hover {
      border-color: var(--color-primary);
      background: var(--color-surface-hover);
      transform: translateY(-2px);
    }

    .grade-button.selected {
      border-color: var(--color-primary);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      color: var(--color-text-inverse);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    .grade-button.high-tier {
      border-color: rgba(34, 197, 94, 0.5);
    }

    .grade-button.high-tier.selected {
      background: linear-gradient(135deg, var(--color-success) 0%, #15803d 100%);
      border-color: var(--color-success);
    }

    .grade-button.foundation-tier {
      border-color: rgba(59, 130, 246, 0.5);
    }

    .grade-button.foundation-tier.selected {
      background: linear-gradient(135deg, var(--color-info) 0%, #2563eb 100%);
      border-color: var(--color-info);
    }

    .grade-info-box {
      margin-top: var(--space-md);
      padding: var(--space-md);
      background: var(--color-surface-hover);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--color-primary);
    }

    .grade-info-box.high {
      border-left-color: var(--color-success);
      background: var(--color-success-bg);
    }

    .grade-info-box.foundation {
      border-left-color: var(--color-info);
      background: var(--color-info-bg);
    }

    .grade-info-title {
      font-weight: 600;
      margin-bottom: var(--space-xs);
      color: var(--color-text);
    }

    .grade-info-text {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    .target-grade-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-xs) var(--space-sm);
      background: var(--color-surface-hover);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .target-grade-badge strong {
      color: var(--color-primary);
    }
</style>

</head>
<body>
  <div id="root">
    <!-- Static loading shell shown until essays load and React mounts -->
    <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;" role="status">
      <div class="spinner"></div>
      <p style="color: var(--color-text-muted); font-size: 1.1rem;">Loading Essay Writing Assistant&hellip;</p>
    </div>
  </div>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
